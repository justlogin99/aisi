name: Ice 自动续期

on:
  schedule:
    # 每 6 小时运行一次（续期有 6 小时冷却期）
    # 时间格式: 分 时 日 月 周几 (UTC)
    - cron: '0 */3 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  icehost_renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool scrot

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase aiohttp

      - name: 运行 IceHost 续期脚本
        env:
          # 服务器控制面板 URL
          ICEHOST_SERVER_URL: ${{ secrets.ICEHOST_SERVER_URL }}
          
          # 登陆 Cookie (cf_clearance; XSRF-TOKEN; icehostpl_session)
          ICEHOST_COOKIE: ${{ secrets.ICEHOST_COOKIE }}
          
          # Telegram 通知（可选）
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python scripts/ice.py

      - name: 上传运行日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: icehost-logs-${{ github.run_number }}
          path: |
            *.png
            *.log
            **/*.log
          retention-days: 7
          if-no-files-found: ignore

      - name: 清理旧的工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
